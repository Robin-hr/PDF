name: Build and Deploy PDF Scanner

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Calculate version with offset (v5, v6, etc.)
      - name: Set Version
        id: set-version
        run: |
          VERSION="v$(( ${{ github.run_number }} + 4 ))"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Inject Private Backend IP
        run: |
          sed -i "s/INTERNAL_BACKEND_IP/${{ secrets.BACKEND_PRIVATE_IP }}/g" frontend/nginx.conf

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pdf-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/pdf-backend:${{ steps.set-version.outputs.version }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pdf-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/pdf-frontend:${{ steps.set-version.outputs.version }}

  deploy-backend:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend via Jump Host
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BACKEND_PRIVATE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.FRONTEND_IP }}
          proxy_username: ec2-user
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/pdf-backend:${{ needs.build-and-push.outputs.version }}
            docker stop pdf-backend || true
            docker rm pdf-backend || true
            docker run -d --name pdf-backend -p 5000:5000 --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/pdf-backend:${{ needs.build-and-push.outputs.version }}
            echo "Successfully deployed Backend ${{ needs.build-and-push.outputs.version }} - This is done! 🚀"

  deploy-frontend:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Frontend to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/pdf-frontend:${{ needs.build-and-push.outputs.version }}
            docker stop pdf-frontend || true
            docker rm pdf-frontend || true
            docker run -d --name pdf-frontend -p 80:80 --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/pdf-frontend:${{ needs.build-and-push.outputs.version }}
            echo "Successfully deployed Frontend ${{ needs.build-and-push.outputs.version }} - This is done! 🚀"
